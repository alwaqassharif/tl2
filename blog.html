<script>
let blogs = [/* same data */];

const perPage = 9;
let currentPage = 1;

function displayBlogs(page) {
const container = document.getElementById("blog-container");
container.innerHTML = "";

const start = (page - 1) * perPage;
const end = start + perPage;

blogs.slice(start, end).forEach(blog => {
container.innerHTML += `
<div class="col-lg-4 col-md-6">
<a href="${blog.link}" style="text-decoration:none; color:inherit;">
<div class="card shadow-sm">
<img src="${blog.image}" class="card-img-top blog-img">
<div class="card-body">
<span class="badge bg-danger">${blog.category}</span>
<h3 class="mt-2">${blog.title}</h3>
<small>${new Date(blog.lastUpdated).toDateString()}</small>
</div>
</div>
</a>
</div>`;
});
}

function setupPagination() {
const pagination = document.getElementById("pagination");
const pageCount = Math.ceil(blogs.length / perPage);

pagination.innerHTML = "";

for (let i = 1; i <= pageCount; i++) {
pagination.innerHTML += `
<li class="page-item ${i === currentPage ? "active" : ""}">
<a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
</li>`;
}
}

function changePage(page) {
currentPage = page;
displayBlogs(page);
setupPagination();
}

displayBlogs(currentPage);
setupPagination();

window.onload = function () {
document.getElementById("spinner").style.display = "none";
};
</script>
